<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryotei Share — ドロワー＆フォーム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
      :root {
        --sun: #ff8c42;
        --sun-light: #fff3eb;
        --sun-mid: #ffd4b3;
        --sun-dark: #c45d1a;
        --sky: #3aafcc;
        --sky-light: #e8f7fb;
        --sky-mid: #a8dfe9;
        --sky-dark: #1a7a93;
        --sand: #f9f6f1;
        --white: #ffffff;
        --ink: #1c1917;
        --ink-2: #57534e;
        --ink-3: #a8a29e;
        --border: rgba(28, 25, 23, 0.09);
        --border-md: rgba(28, 25, 23, 0.14);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family: 'DM Sans', sans-serif;
        background: #eeebe6;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .screen {
        width: 390px;
        min-height: 100dvh;
        background: var(--white);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      /* ── Header ── */
      .header {
        background: var(--white);
        padding: 14px 18px;
        border-bottom: 0.5px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 10;
        transition: opacity 0.3s;
      }
      .header.dimmed {
        opacity: 0.4;
        pointer-events: none;
      }
      .menu-btn {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: 0.5px solid var(--border-md);
        background: var(--white);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s;
      }
      .menu-btn:hover {
        background: var(--sand);
      }
      .menu-btn i {
        font-size: 17px;
        color: var(--ink-2);
      }
      .header-title {
        font-size: 15px;
        font-weight: 500;
        color: var(--ink);
        flex: 1;
      }
      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--sun-light);
        border: 0.5px solid var(--sun-mid);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .avatar i {
        font-size: 17px;
        color: var(--sun-dark);
      }

      /* ── Timeline body (behind drawer) ── */
      .tl-body {
        background: var(--sand);
        padding: 12px 18px 80px;
        flex: 1;
        transition: filter 0.3s;
      }
      .tl-body.blurred {
        filter: blur(1px);
      }
      .date-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--sky-light);
        border: 0.5px solid var(--sky-mid);
        border-radius: 20px;
        padding: 4px 13px;
        margin-bottom: 10px;
        font-size: 11px;
        font-weight: 500;
        color: var(--sky-dark);
      }
      .date-pill i {
        font-size: 12px;
      }
      .tl-row {
        display: flex;
        align-items: stretch;
      }
      .rail {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 28px;
        padding-top: 14px;
        flex-shrink: 0;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--sun);
        flex-shrink: 0;
      }
      .line {
        width: 1.5px;
        flex: 1;
        min-height: 20px;
        background: var(--border-md);
        margin-top: 4px;
      }
      .event-card {
        flex: 1;
        background: var(--white);
        border: 0.5px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .event-meta {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: var(--ink-3);
        margin-bottom: 3px;
      }
      .event-meta i {
        font-size: 12px;
      }
      .event-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
      }
      .event-more i {
        font-size: 17px;
        color: var(--ink-3);
      }

      /* ── Overlay ── */
      .overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(28, 25, 23, 0.18);
        z-index: 40;
        transition: opacity 0.3s;
      }
      .overlay.open {
        display: block;
      }

      /* ── Drawer sheet ── */
      .drawer-sheet {
        position: absolute;
        bottom: -100%;
        left: 0;
        right: 0;
        background: var(--white);
        border-radius: 22px 22px 0 0;
        padding: 0 0 32px;
        z-index: 50;
        transition: bottom 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        max-height: 82%;
        overflow-y: auto;
      }
      .drawer-sheet.open {
        bottom: 0;
      }
      .drawer-handle-row {
        padding: 12px;
        display: flex;
        justify-content: center;
      }
      .drawer-handle {
        width: 36px;
        height: 3px;
        background: var(--border-md);
        border-radius: 2px;
      }
      .drawer-new {
        margin: 0 14px 6px;
        height: 48px;
        border-radius: 14px;
        background: var(--sun);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: #fff;
        transition: opacity 0.15s;
      }
      .drawer-new:hover {
        opacity: 0.88;
      }
      .drawer-new i {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.85);
      }
      .d-item {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-top: 0.5px solid var(--border);
        cursor: pointer;
        transition: background 0.12s;
      }
      .d-item:hover {
        background: var(--sand);
      }
      .d-icon {
        width: 36px;
        height: 36px;
        border-radius: 11px;
        background: var(--sky-light);
        border: 0.5px solid var(--sky-mid);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .d-icon i {
        font-size: 17px;
        color: var(--sky-dark);
      }
      .d-item.active .d-icon {
        background: var(--sun-light);
        border-color: var(--sun-mid);
      }
      .d-item.active .d-icon i {
        color: var(--sun-dark);
      }
      .d-info {
        flex: 1;
      }
      .d-name {
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
      }
      .d-sub {
        font-size: 11px;
        color: var(--ink-3);
        margin-top: 1px;
      }
      .d-active-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--sun);
        flex-shrink: 0;
      }
      .d-more i {
        font-size: 16px;
        color: var(--ink-3);
      }

      /* ── Form overlay ── */
      .form-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(28, 25, 23, 0.18);
        z-index: 60;
      }
      .form-overlay.open {
        display: flex;
        align-items: flex-end;
      }
      .form-sheet {
        background: var(--white);
        border-radius: 22px 22px 0 0;
        width: 100%;
        padding-bottom: 32px;
      }
      .form-header {
        padding: 14px 18px;
        border-bottom: 0.5px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .form-header i {
        font-size: 18px;
        color: var(--ink-2);
        cursor: pointer;
      }
      .form-header-title {
        font-size: 15px;
        font-weight: 500;
        color: var(--ink);
      }
      .form-body {
        padding: 24px 18px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--ink-3);
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }
      .field-ctrl {
        height: 48px;
        background: var(--sand);
        border: 0.5px solid var(--border-md);
        border-radius: 14px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        color: var(--ink);
        cursor: pointer;
      }
      .field-ctrl.focus {
        border-color: var(--sun);
        border-width: 1.5px;
      }
      .field-ctrl i {
        font-size: 16px;
        color: var(--ink-3);
      }
      .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 4px;
      }
      .btn-cancel {
        flex: 1;
        height: 48px;
        border-radius: 14px;
        border: 0.5px solid var(--border-md);
        background: var(--white);
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink-2);
        transition: background 0.15s;
      }
      .btn-cancel:hover {
        background: var(--sand);
      }
      .btn-submit {
        flex: 2;
        height: 48px;
        border-radius: 14px;
        background: var(--sun);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: #fff;
        transition: opacity 0.15s;
      }
      .btn-submit:hover {
        opacity: 0.88;
      }
      .btn-submit i {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.85);
      }

      /* FAB */
      .fab {
        position: absolute;
        bottom: 28px;
        right: 18px;
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: var(--sun);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20;
        transition: opacity 0.15s;
      }
      .fab:hover {
        opacity: 0.88;
      }
      .fab i {
        font-size: 24px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="screen" id="screen">
      <!-- Header -->
      <header class="header" id="header">
        <button class="menu-btn" onclick="openDrawer()" aria-label="旅程一覧">
          <i class="ti ti-layout-sidebar"></i>
        </button>
        <span class="header-title">旅程テスト２</span>
        <div class="avatar"><i class="ti ti-user"></i></div>
      </header>

      <!-- Timeline (behind drawer) -->
      <div class="tl-body" id="tlBody">
        <div style="margin-top: 16px">
          <div class="date-pill"><i class="ti ti-calendar"></i>2025年12月15日</div>
          <div class="tl-row">
            <div class="rail">
              <div class="dot"></div>
              <div class="line"></div>
            </div>
            <div class="event-card">
              <div>
                <div class="event-meta"><i class="ti ti-clock"></i>21:20</div>
                <div class="event-title">$1</div>
              </div>
              <div class="event-more"><i class="ti ti-dots-vertical"></i></div>
            </div>
          </div>
        </div>
        <div style="margin-top: 16px">
          <div class="date-pill"><i class="ti ti-calendar"></i>2026年2月23日</div>
          <div class="tl-row">
            <div class="rail">
              <div class="dot"></div>
              <div class="line"></div>
            </div>
            <div class="event-card">
              <div>
                <div class="event-meta"><i class="ti ti-clock"></i>22:05</div>
                <div class="event-title">え？</div>
              </div>
              <div class="event-more"><i class="ti ti-dots-vertical"></i></div>
            </div>
          </div>
          <div class="tl-row">
            <div class="rail">
              <div class="dot"></div>
              <div class="line"></div>
            </div>
            <div class="event-card">
              <div>
                <div class="event-meta"><i class="ti ti-clock"></i>23:05</div>
                <div class="event-title">お</div>
              </div>
              <div class="event-more"><i class="ti ti-dots-vertical"></i></div>
            </div>
          </div>
        </div>
      </div>

      <!-- FAB -->
      <button class="fab" onclick="openForm()" aria-label="予定を追加"><i class="ti ti-plus"></i></button>

      <!-- Drawer overlay -->
      <div class="overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
      <div class="drawer-sheet" id="drawerSheet">
        <div class="drawer-handle-row"><div class="drawer-handle"></div></div>
        <button class="drawer-new" onclick="closeDrawer()"><i class="ti ti-plus"></i>旅程を作成</button>
        <div class="d-item active">
          <div class="d-icon"><i class="ti ti-plane"></i></div>
          <div class="d-info">
            <div class="d-name">旅程テスト２</div>
            <div class="d-sub">3 件の予定</div>
          </div>
          <div class="d-active-dot"></div>
          <div class="d-more"><i class="ti ti-dots-vertical"></i></div>
        </div>
        <div class="d-item">
          <div class="d-icon"><i class="ti ti-map-pin"></i></div>
          <div class="d-info">
            <div class="d-name">旅程てすと１</div>
            <div class="d-sub">2 件の予定</div>
          </div>
          <div class="d-more"><i class="ti ti-dots-vertical"></i></div>
        </div>
        <div class="d-item">
          <div class="d-icon"><i class="ti ti-luggage"></i></div>
          <div class="d-info">
            <div class="d-name">佳澄と旅行だ</div>
            <div class="d-sub">1 件の予定</div>
          </div>
          <div class="d-more"><i class="ti ti-dots-vertical"></i></div>
        </div>
        <div class="d-item">
          <div class="d-icon"><i class="ti ti-mountain"></i></div>
          <div class="d-info">
            <div class="d-name">テスト３</div>
            <div class="d-sub">4 件の予定</div>
          </div>
          <div class="d-more"><i class="ti ti-dots-vertical"></i></div>
        </div>
        <div class="d-item">
          <div class="d-icon"><i class="ti ti-beach"></i></div>
          <div class="d-info">
            <div class="d-name">hs</div>
            <div class="d-sub">0 件の予定</div>
          </div>
          <div class="d-more"><i class="ti ti-dots-vertical"></i></div>
        </div>
      </div>

      <!-- Form overlay -->
      <div class="form-overlay" id="formOverlay">
        <div class="form-sheet">
          <div class="form-header">
            <i class="ti ti-chevron-down" onclick="closeForm()"></i>
            <span class="form-header-title">予定を入力</span>
          </div>
          <div class="form-body">
            <div>
              <div class="field-label">日時</div>
              <div class="field-ctrl focus">
                <span>2025 / 12 / 15　21:20</span>
                <i class="ti ti-calendar"></i>
              </div>
            </div>
            <div>
              <div class="field-label">内容</div>
              <div class="field-ctrl">
                <span style="color: var(--ink-3)">予定の内容を入力</span>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn-cancel" onclick="closeForm()">キャンセル</button>
              <button class="btn-submit"><i class="ti ti-check"></i>追加する</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function openDrawer() {
        document.getElementById('drawerOverlay').classList.add('open')
        document.getElementById('drawerSheet').classList.add('open')
        document.getElementById('header').classList.add('dimmed')
        document.getElementById('tlBody').classList.add('blurred')
      }
      function closeDrawer() {
        document.getElementById('drawerOverlay').classList.remove('open')
        document.getElementById('drawerSheet').classList.remove('open')
        document.getElementById('header').classList.remove('dimmed')
        document.getElementById('tlBody').classList.remove('blurred')
      }
      function openForm() {
        document.getElementById('formOverlay').classList.add('open')
      }
      function closeForm() {
        document.getElementById('formOverlay').classList.remove('open')
      }
    </script>
  </body>
</html>
