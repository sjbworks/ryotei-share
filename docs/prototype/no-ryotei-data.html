<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryotei Share — 旅程（空）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
      :root {
        --sun: #ff8c42;
        --sun-light: #fff3eb;
        --sun-mid: #ffd4b3;
        --sun-dark: #c45d1a;
        --sky: #3aafcc;
        --sky-light: #e8f7fb;
        --sky-mid: #a8dfe9;
        --sky-dark: #1a7a93;
        --sand: #f9f6f1;
        --white: #ffffff;
        --ink: #1c1917;
        --ink-2: #57534e;
        --ink-3: #a8a29e;
        --border: rgba(28, 25, 23, 0.09);
        --border-md: rgba(28, 25, 23, 0.14);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family: 'DM Sans', sans-serif;
        background: var(--sand);
        display: flex;
        justify-content: center;
      }
      .screen {
        width: 390px;
        min-height: 100%;
        background: var(--white);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* Header */
      .header {
        background: var(--white);
        padding: 14px 18px;
        border-bottom: 0.5px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .menu-btn {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: 0.5px solid var(--border-md);
        background: var(--white);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }
      .menu-btn i {
        font-size: 17px;
        color: var(--ink-2);
      }
      .menu-btn.share i {
        color: var(--sky-dark);
      }
      .header-title {
        font-size: 15px;
        font-weight: 500;
        color: var(--ink);
        flex: 1;
      }
      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--sun-light);
        border: 0.5px solid var(--sun-mid);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .avatar i {
        font-size: 17px;
        color: var(--sun-dark);
      }

      /* Empty state body */
      .body {
        background: var(--sand);
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 32px;
        gap: 0;
      }

      /* Illustration */
      .illust {
        width: 100px;
        height: 100px;
        border-radius: 28px;
        background: var(--white);
        border: 0.5px solid var(--border-md);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        position: relative;
      }
      .illust i {
        font-size: 44px;
        color: var(--sun-mid);
      }
      .illust-badge {
        position: absolute;
        bottom: -8px;
        right: -8px;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: var(--sun);
        border: 2px solid var(--sand);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .illust-badge i {
        font-size: 14px;
        color: #fff;
      }

      .empty-title {
        font-size: 17px;
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 8px;
        text-align: center;
      }
      .empty-desc {
        font-size: 14px;
        color: var(--ink-3);
        text-align: center;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      /* Steps */
      .steps {
        width: 100%;
        background: var(--white);
        border: 0.5px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        margin-bottom: 28px;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        border-bottom: 0.5px solid var(--border);
      }
      .step:last-child {
        border-bottom: none;
      }
      .step-num {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: var(--sky-light);
        border: 0.5px solid var(--sky-mid);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 12px;
        font-weight: 500;
        color: var(--sky-dark);
      }
      .step-text {
        font-size: 13px;
        color: var(--ink-2);
        line-height: 1.4;
      }
      .step-text strong {
        color: var(--ink);
        font-weight: 500;
      }

      /* CTA button */
      .cta {
        width: 100%;
        height: 50px;
        border-radius: 15px;
        background: var(--sun);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        font-weight: 500;
        color: #fff;
        transition: opacity 0.15s;
      }
      .cta:hover {
        opacity: 0.88;
      }
      .cta i {
        font-size: 20px;
        color: rgba(255, 255, 255, 0.85);
      }

      /* FAB */
      .fab {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(calc(-50% + 177px));
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: var(--sun);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20;
        transition: opacity 0.15s;
      }
      .fab:hover {
        opacity: 0.88;
      }
      .fab i {
        font-size: 24px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="screen">
      <header class="header">
        <button class="menu-btn" aria-label="旅程一覧">
          <i class="ti ti-layout-sidebar"></i>
        </button>
        <span class="header-title">はじめての旅程</span>
        <button class="menu-btn share" aria-label="旅程をシェア">
          <i class="ti ti-share"></i>
        </button>
        <div class="avatar"><i class="ti ti-user"></i></div>
      </header>

      <div class="body">
        <div class="illust">
          <i class="ti ti-map-2" aria-hidden="true"></i>
          <div class="illust-badge"><i class="ti ti-plus" aria-hidden="true"></i></div>
        </div>

        <p class="empty-title">予定を登録しましょう</p>
        <p class="empty-desc">旅の行程を日時順に追加して<br />旅仲間とシェアできます</p>

        <div class="steps">
          <div class="step">
            <div class="step-num">1</div>
            <p class="step-text"><strong>＋ボタン</strong>から予定を追加</p>
          </div>
          <div class="step">
            <div class="step-num">2</div>
            <p class="step-text">日時・場所・カテゴリを入力</p>
          </div>
          <div class="step">
            <div class="step-num">3</div>
            <p class="step-text">シェアボタンで旅仲間に共有</p>
          </div>
        </div>

        <button class="cta" aria-label="最初の予定を追加する">
          <i class="ti ti-plus" aria-hidden="true"></i>
          最初の予定を追加する
        </button>
      </div>

      <button class="fab" aria-label="予定を追加">
        <i class="ti ti-plus"></i>
      </button>
    </div>
  </body>
</html>
