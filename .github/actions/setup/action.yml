name: Setup Node.js
description: Checkout, setup Node.js, and install dependencies

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm install -g npm@11
      shell: bash
    - run: npm ci
      shell: bash
